<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<script>
/* Theme tokens — 3 variations via Tweaks */
const TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "noir",
  "mode": "dark",
  "readingWidth": 680,
  "codeStyle": "terminal",
  "aiDock": "br",
  "lang": "en"
}/*EDITMODE-END*/;
window.__TWEAKS__ = { ...TWEAKS };
</script>

<style>
  :root {
    --font-display: 'Instrument Serif', 'Times New Roman', serif;
    --font-read: 'Newsreader', Georgia, serif;
    --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;

    /* Defaults — overridden by data-theme/data-mode */
    --bg: #FBF9F5;
    --bg-tint: #F2EDE3;
    --surface: #FFFFFF;
    --ink: #1A1916;
    --ink-soft: #4A4742;
    --ink-mute: #7A756C;
    --rule: #E6DFD1;
    --rule-soft: #EFEAE0;
    --accent: #B4532A;       /* sanguine / ocre brûlé */
    --accent-soft: #E8D7C7;
    --highlight: #F4E4C1;
    --shadow: 0 1px 2px rgba(26,25,22,.04), 0 8px 24px rgba(26,25,22,.06);
  }

  /* === Theme: Sanguine (light) === */
  [data-theme="sanguine"][data-mode="light"] {
    --bg: #FBF9F5; --bg-tint: #F2EDE3; --surface: #FFFFFF;
    --ink: #1A1916; --ink-soft: #4A4742; --ink-mute: #807A70;
    --rule: #E6DFD1; --rule-soft: #EFEAE0;
    --accent: #B4532A; --accent-soft: #E8D7C7; --highlight: #F4E4C1;
  }
  [data-theme="sanguine"][data-mode="dark"] {
    --bg: #141311; --bg-tint: #1C1B18; --surface: #1E1D1A;
    --ink: #F2EDE3; --ink-soft: #BDB6A8; --ink-mute: #807A70;
    --rule: #2A2824; --rule-soft: #242320;
    --accent: #E89268; --accent-soft: #3A2A20; --highlight: #3A2F1A;
  }

  /* === Theme: Noir Editorial === */
  [data-theme="noir"][data-mode="light"] {
    --bg: #F4F1EB; --bg-tint: #E8E3D7; --surface: #FFFFFF;
    --ink: #111111; --ink-soft: #3A3A38; --ink-mute: #737068;
    --rule: #D8D2C4; --rule-soft: #E2DCCE;
    --accent: #8A2B1F; --accent-soft: #EAD4CF; --highlight: #F0D9C9;
  }
  [data-theme="noir"][data-mode="dark"] {
    --bg: #0B0B0A; --bg-tint: #131211; --surface: #161513;
    --ink: #EEEAE0; --ink-soft: #B5AFA2; --ink-mute: #70695E;
    --rule: #242220; --rule-soft: #1C1B19;
    --accent: #C4453A; --accent-soft: #2A1815; --highlight: #2E1A12;
  }

  /* === Theme: Swiss Monochrome === */
  [data-theme="swiss"][data-mode="light"] {
    --bg: #FFFFFF; --bg-tint: #F4F4F2; --surface: #FFFFFF;
    --ink: #000000; --ink-soft: #2B2B2B; --ink-mute: #808080;
    --rule: #DEDEDE; --rule-soft: #EBEBEB;
    --accent: #000000; --accent-soft: #E8E8E8; --highlight: #F0F0F0;
  }
  [data-theme="swiss"][data-mode="dark"] {
    --bg: #0A0A0A; --bg-tint: #141414; --surface: #161616;
    --ink: #FFFFFF; --ink-soft: #D0D0D0; --ink-mute: #808080;
    --rule: #282828; --rule-soft: #1E1E1E;
    --accent: #FFFFFF; --accent-soft: #222; --highlight: #1C1C1C;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-ui);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background-color .3s ease, color .3s ease;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  ::selection { background: var(--highlight); color: var(--ink); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-mute); }

  #root { min-height: 100vh; }

  /* Reading progress */
  .read-progress {
    position: fixed; top: 0; left: 0; height: 2px;
    background: var(--accent); z-index: 100;
    transition: width .1s linear;
  }
</style>
